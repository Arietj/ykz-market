components:
  schemas:
    Cart:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        created:
          type: string
          format: date-time
          readOnly: true
        updated:
          type: string
          format: date-time
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
      required:
      - created
      - id
      - items
      - updated
      - user
    CartItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          allOf:
          - $ref: '#/components/schemas/Product'
          readOnly: true
        product_id:
          type: integer
          writeOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        price:
          type: string
          readOnly: true
      required:
      - id
      - price
      - product
      - product_id
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название категории
          maxLength: 100
        icon:
          type: string
          format: uri
          nullable: true
          title: Иконка
        slug:
          type: string
          title: Слаг
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
    CategoryDetail:
      type: object
      properties:
        sub_categories:
          type: array
          items:
            $ref: '#/components/schemas/SubCategory'
          readOnly: true
      required:
      - sub_categories
    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        created:
          type: string
          format: date-time
          readOnly: true
        changed:
          type: string
          format: date-time
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        total_order_price:
          type: string
          readOnly: true
      required:
      - changed
      - created
      - id
      - items
      - total_order_price
      - user
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          allOf:
          - $ref: '#/components/schemas/Product'
          readOnly: true
        product_name:
          type: string
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        total_price:
          type: string
          readOnly: true
      required:
      - id
      - price
      - product
      - product_name
      - quantity
      - total_price
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название
          maxLength: 100
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          title: Цена
        category_detail:
          allOf:
          - $ref: '#/components/schemas/CategoryDetail'
          readOnly: true
        sub_categories:
          type: array
          items:
            $ref: '#/components/schemas/SubCategory'
          readOnly: true
      required:
      - category_detail
      - id
      - name
      - price
      - sub_categories
    StatusEnum:
      enum:
      - new
      - paid
      - shipped
      - completed
      - canceled
      type: string
      description: |-
        * `new` - New
        * `paid` - Paid
        * `shipped` - Shipped
        * `completed` - Completed
        * `canceled` - Canceled
    SubCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        category:
          type: integer
        name:
          type: string
          maxLength: 100
      required:
      - category
      - id
      - name
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        first_name:
          type: string
          maxLength: 50
        last_name:
          type: string
          maxLength: 50
        password:
          type: string
          writeOnly: true
      required:
      - email
      - first_name
      - id
      - last_name
      - password
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
